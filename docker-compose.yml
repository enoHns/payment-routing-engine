version: '3.7'

services:
  postgres:
    image: postgres:11-alpine
    environment:
      POSTGRES_USER: routing
      POSTGRES_PASSWORD: routing_secret
      POSTGRES_DB: routing_engine
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U routing']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:5-alpine
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
